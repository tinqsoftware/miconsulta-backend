server {
    listen 80;
    listen [::]:80;
    
    # Cambia esto por tu dominio real en Hostinger
    server_name api.miconsulta.com www.api.miconsulta.com;
    
    # Redirigir tráfico HTTP a HTTPS (Descomentar al tener SSL)
    # return 301 https://$host$request_uri;

    # El document root debe apuntar a la carpeta /public de Laravel
    root /var/www/html/backend/public;
    
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    index index.php index.html index.htm;

    charset utf-8;

    # Redirecciona todas las rutas de la API a index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        # Dependiendo de tu versión de PHP-FPM en Hostinger (ej: php8.2-fpm.sock)
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
